name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ArchitectureGovernance.sln

      - name: Build
        run: dotnet build ArchitectureGovernance.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ArchitectureGovernance.sln --configuration Release --no-build

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web/architecture-governance-portal
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/web/architecture-governance-portal/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build -- --configuration production

      - name: Test
        run: npm test

  docker-validation:
    name: Docker Validation
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup .env
        run: cp .env.example .env

      - name: Validate Docker Compose Build
        run: docker compose build
