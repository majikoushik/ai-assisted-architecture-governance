services:
  api:
    build:
      context: .
      dockerfile: src/api/ArchitectureGovernance.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AiProvider__Provider=${AI_PROVIDER:-Mock}
      - AiProvider__AzureOpenAi__Endpoint=${AZURE_OPENAI_ENDPOINT:-}
      - AiProvider__AzureOpenAi__ApiKey=${AZURE_OPENAI_KEY:-}
      - AiProvider__AzureOpenAi__DeploymentName=${AZURE_OPENAI_DEPLOYMENT_NAME:-}
      - ConnectionStrings__ArchitectureGovernance=Server=sqlserver;Database=ArchitectureGovernance;User Id=sa;Password=${SQLSERVER_SA_PASSWORD:-Change_this_local_password_only_123!};TrustServerCertificate=True;
    ports:
      - "5080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

  web:
    build:
      context: src/web/architecture-governance-portal
      dockerfile: Dockerfile
    environment:
      - API_BASE_URL=http://api:8080
    ports:
      - "4200:80"
    depends_on:
      - api

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQLSERVER_SA_PASSWORD:-Change_this_local_password_only_123!}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${SQLSERVER_SA_PASSWORD:-Change_this_local_password_only_123!} -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sqlserver-data:
