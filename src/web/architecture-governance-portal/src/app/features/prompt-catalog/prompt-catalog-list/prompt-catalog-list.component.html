<div class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
  <div class="px-4 py-6 sm:px-0">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold text-gray-900">Prompt Catalog</h1>
      <span class="inline-flex items-center rounded-md bg-blue-50 px-2 py-1 text-xs font-medium text-blue-700 ring-1 ring-inset ring-blue-700/10">Read Only</span>
    </div>

    <div *ngIf="isLoading" class="flex justify-center py-10">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
    </div>

    <div *ngIf="!isLoading && prompts.length === 0" class="text-center py-10">
      <p class="text-gray-500">No prompt templates found.</p>
    </div>

    <div *ngIf="!isLoading && prompts.length > 0" class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
      <div *ngFor="let prompt of prompts" class="bg-white overflow-hidden shadow rounded-lg flex flex-col transition-all hover:shadow-md">
        <div class="p-5 flex-grow">
          <div class="flex items-center justify-between mb-2">
            <h3 class="text-lg leading-6 font-medium text-gray-900">{{ prompt.name }}</h3>
            <span class="inline-flex items-center rounded-md bg-green-50 px-2 py-1 text-xs font-medium text-green-700 ring-1 ring-inset ring-green-600/20">{{ prompt.version }}</span>
          </div>
          <div class="mt-2 text-sm text-gray-500">
            <p><strong>Artifact Type:</strong> {{ prompt.artifactType }}</p>
          </div>
          <p class="mt-4 text-sm text-gray-600 line-clamp-3">
            {{ prompt.purpose }}
          </p>
        </div>
        <div class="bg-gray-50 px-5 py-3 border-t border-gray-200">
          <div class="text-sm">
            <a [routerLink]="['/prompts', prompt.id]" class="font-medium text-indigo-600 hover:text-indigo-500">
              View Details <span aria-hidden="true">&rarr;</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
